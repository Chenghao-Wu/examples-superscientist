name: Build and publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv (for conda-lock drift check)
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Verify lockfile is in sync with environment.yml
        run: |
          cp conda-linux-64.lock /tmp/before-amd64.lock
          uvx --from conda-lock conda-lock \
            --file environment.yml \
            --platform linux-64 \
            --kind explicit \
            --filename-template 'conda-{platform}.lock'
          if ! diff -q /tmp/before-amd64.lock conda-linux-64.lock; then
            echo "::error::conda-linux-64.lock is out of sync with environment.yml."
            echo "Regenerate locally with:"
            echo "  uvx --from conda-lock conda-lock --file environment.yml --platform linux-64 --kind explicit --filename-template 'conda-{platform}.lock'"
            exit 1
          fi

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/examples-superscientist
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}

      - name: Build (PR — no push) or build+push (main / tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker buildx build --platform linux/amd64 --load -t smoke-amd64 .
          docker run --rm -v "$PWD:/work" -w /work smoke-amd64 lmp -in smoke-test.lmp
          grep "Total wall time" log.lammps
          rm -f log.lammps
