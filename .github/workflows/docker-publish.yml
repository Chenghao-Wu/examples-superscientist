name: Build and publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv (for conda-lock drift check)
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Verify lockfile input_hash matches environment.yml
        # We compare conda-lock's `input_hash` rather than the full file, because
        # conda-forge frequently republishes transient packages (pip, wheel, etc.)
        # which would cause a full-file diff even when no env.yml edits occurred.
        # `input_hash` is derived purely from the env.yml spec, so it only changes
        # when the user actually edits environment.yml.
        run: |
          mkdir -p /tmp/lockcheck
          uvx --from conda-lock conda-lock \
            --file environment.yml \
            --platform linux-64 \
            --kind explicit \
            --filename-template '/tmp/lockcheck/conda-{platform}.lock'
          fresh_hash=$(grep '^# input_hash:' /tmp/lockcheck/conda-linux-64.lock | awk '{print $3}')
          committed_hash=$(grep '^# input_hash:' conda-linux-64.lock | awk '{print $3}')
          if [ -z "$committed_hash" ] || [ -z "$fresh_hash" ]; then
            echo "::error::Could not extract input_hash from one of the lockfiles."
            exit 1
          fi
          if [ "$fresh_hash" != "$committed_hash" ]; then
            echo "::error::environment.yml was edited but conda-linux-64.lock was not regenerated."
            echo "  committed input_hash: $committed_hash"
            echo "  fresh input_hash:     $fresh_hash"
            echo "Regenerate locally with:"
            echo "  uvx --from conda-lock conda-lock --file environment.yml --platform linux-64 --kind explicit --filename-template 'conda-{platform}.lock'"
            exit 1
          fi
          echo "input_hash matches: $committed_hash"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/examples-superscientist
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=semver,pattern=v{{version}}

      - name: Build (PR — no push) or build+push (main / tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker buildx build --platform linux/amd64 --load -t smoke-amd64 .
          # Match the host wrappers (bin/lmp etc.): pass --user so the container
          # writes log.lammps with the runner's UID rather than mambauser's UID
          # (which would hit "Permission denied" on the bind-mounted /work).
          docker run --rm -v "$PWD:/work" -w /work \
            --user "$(id -u):$(id -g)" \
            smoke-amd64 lmp -in smoke-test.lmp
          grep "Total wall time" log.lammps
          rm -f log.lammps
